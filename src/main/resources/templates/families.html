<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Wedding Families</title>
  <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<h1>Wedding Families</h1>
<p class="summary">Total families: <strong th:text="${totalFamilies}"></strong></p>

<div class="search-box">
  <input type="text" id="familySearch" placeholder="Search for a family..." onkeyup="filterFamilies()">
</div>

<div class="grid">
  <div class="card" th:each="family : ${families}">
    <div class="name" th:text="${family}"></div>
  </div>
</div>

<a class="link" href="/">⬅ Back to main page</a>

<script>
    function filterFamilies() {
        let input = document.getElementById("familySearch").value.toLowerCase();
        let cards = document.getElementsByClassName("card");
        for (let card of cards) {
            let name = card.querySelector(".name").textContent.toLowerCase();
            card.style.display = (name.includes(input)) ? "block" : "none";
        }
    }
</script>
</body>
</html>
