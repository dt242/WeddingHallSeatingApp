<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Wedding Tables</title>
  <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<h1>Wedding Tables</h1>
<p class="summary">Total tables: <strong th:text="${totalTables}"></strong></p>

<div class="search-box">
  <input type="text" id="tableSearch" placeholder="Search for a table..." onkeyup="filterTables()">
</div>

<div class="grid">
  <div class="card" th:each="table : ${tables}">
    <div class="name" th:text="${table}"></div>
  </div>
</div>

<a class="link" href="/">⬅ Back to main page</a>

<script>
    function filterTables() {
        let input = document.getElementById("tableSearch").value.toLowerCase();
        let cards = document.getElementsByClassName("card");
        for (let card of cards) {
            let name = card.querySelector(".name").textContent.toLowerCase();
            card.style.display = (name.includes(input)) ? "block" : "none";
        }
    }
</script>
</body>
</html>
